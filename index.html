<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GitFit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; -webkit-tap-highlight-color: transparent; padding-bottom: 80px; }
        .input-gym { background-color: #1e293b; border: 1px solid #334155; color: white; }
        .input-gym:focus { outline: none; border-color: #3b82f6; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .muscle-pill { padding: 5px 12px; border-radius: 999px; font-size: 0.75rem; cursor: pointer; border: 1px solid #475569; }
        .muscle-pill.active { background-color: #2563eb; border-color: #2563eb; }
    </style>
</head>
<body class="antialiased">

    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-sm">
            <h1 class="text-3xl font-bold text-blue-400 mb-6 text-center">GitFit Login</h1>
            <input type="email" id="email" placeholder="E-Mail" class="w-full p-3 mb-4 rounded-xl bg-slate-700 border border-slate-600 text-white">
            <input type="password" id="password" placeholder="Passwort" class="w-full p-3 mb-6 rounded-xl bg-slate-700 border border-slate-600 text-white">
            <button id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-xl font-bold text-white">Anmelden</button>
            <p id="login-error" class="text-red-400 text-sm mt-4 text-center hidden">Login fehlgeschlagen!</p>
        </div>
    </div>

    <header class="bg-slate-800 p-4 sticky top-0 z-10 shadow-md">
        <h1 class="text-xl font-bold text-blue-400 flex items-center gap-2">
            <i class="fa-solid fa-hand-fist"></i> GitFit
        </h1>
    </header>

    <main class="p-4" id="main-content">
        <!-- Dashboard -->
        <section id="view-dashboard" class="view-section active">
            <h2 class="text-2xl font-bold mb-4">Übersicht</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-800 p-4 rounded-2xl"><p class="text-slate-400 text-sm">Workouts</p><p class="text-2xl font-bold">12</p></div>
                <div class="bg-slate-800 p-4 rounded-2xl"><p class="text-slate-400 text-sm">Volumen</p><p class="text-2xl font-bold">14.5 t</p></div>
            </div>
            <canvas id="volumeChart" class="bg-slate-800 p-4 rounded-2xl"></canvas>
        </section>

        <!-- Workout -->
        <section id="view-workout" class="view-section">
            <h2 class="text-2xl font-bold mb-4">Neues Workout</h2>
            <select id="exercise-select" class="w-full p-4 rounded-xl input-gym mb-4"><option>Übung wählen...</option></select>
            <div id="tracking-input-area" class="bg-slate-800 p-4 rounded-2xl mb-4"></div>
        </section>

        <!-- Übungen & Geräte -->
        <section id="view-exercises" class="view-section">
            <h2 class="text-2xl font-bold mb-4">Geräte & Übungen</h2>
            <div class="bg-slate-800 p-4 rounded-2xl mb-4">
                <input type="text" id="new-ex-name" class="w-full p-3 rounded-xl input-gym mb-2" placeholder="Übungsname">
                <label class="block text-sm text-slate-400 mt-2">Primäre Muskelgruppen</label>
                <div id="primary-muscles" class="flex flex-wrap gap-2 mt-1 mb-3"></div>
                <label class="block text-sm text-slate-400">Sekundäre Muskelgruppen</label>
                <div id="secondary-muscles" class="flex flex-wrap gap-2 mt-1 mb-4"></div>
                <button id="btn-save-exercise" class="w-full bg-blue-600 p-3 rounded-xl font-bold">Speichern</button>
            </div>
            <div id="exercises-list" class="space-y-2"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full bg-slate-800 border-t border-slate-700 flex justify-around p-2 z-20">
        <button onclick="switchView('view-dashboard')" class="p-2 text-blue-500"><i class="fa-solid fa-chart-pie text-xl"></i></button>
        <button onclick="switchView('view-workout')" class="p-2 text-slate-400"><i class="fa-solid fa-plus-circle text-xl"></i></button>
        <button onclick="switchView('view-exercises')" class="p-2 text-slate-400"><i class="fa-solid fa-list text-xl"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAOgvwt-l9DUpPeMPE-Pl9znDhIo1B_xB4",
            authDomain: "gitfit-3d78b.firebaseapp.com",
            projectId: "gitfit-3d78b",
            storageBucket: "gitfit-3d78b.firebasestorage.app",
            messagingSenderId: "595413065350",
            appId: "1:595413065350:web:2a0dde9defc2f750d4bb07"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        const muscles = ["Brust", "Rücken", "Beine", "Schultern", "Bizeps", "Trizeps", "Bauch"];

        function createPills() {
            const pContainer = document.getElementById('primary-muscles');
            const sContainer = document.getElementById('secondary-muscles');
            muscles.forEach(m => {
                pContainer.innerHTML += `<div class="muscle-pill" onclick="this.classList.toggle('active')">${m}</div>`;
                sContainer.innerHTML += `<div class="muscle-pill" onclick="this.classList.toggle('active')">${m}</div>`;
            });
        }

        onAuthStateChanged(auth, (user) => {
            document.getElementById('login-overlay').classList.toggle('hidden', !!user);
            if(user) createPills();
        });

        document.getElementById('btn-login').addEventListener('click', async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            } catch (err) {
                document.getElementById('login-error').classList.remove('hidden');
            }
        });

        window.switchView = (id) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
    </script>
</body>
</html>
