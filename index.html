<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GitFit - Dein Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; padding-bottom: 80px; }
        .input-gym { background-color: #1e293b; border: 1px solid #334155; color: white; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .muscle-pill { padding: 6px 14px; border-radius: 999px; font-size: 0.8rem; cursor: pointer; border: 1px solid #475569; transition: all 0.2s; }
        .muscle-pill.active { background-color: #2563eb; border-color: #2563eb; }
    </style>
</head>
<body class="antialiased">

    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-sm">
            <h1 class="text-3xl font-bold text-blue-400 mb-6 text-center">GitFit Login</h1>
            <input type="email" id="email" placeholder="E-Mail" class="w-full p-3 mb-4 rounded-xl bg-slate-700 border border-slate-600 text-white">
            <input type="password" id="password" placeholder="Passwort" class="w-full p-3 mb-6 rounded-xl bg-slate-700 border border-slate-600 text-white">
            <button id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-xl font-bold text-white">Anmelden</button>
        </div>
    </div>

    <!-- UI Main Content -->
    <main class="p-4">
        <section id="view-dashboard" class="view-section active">
            <h2 class="text-2xl font-bold mb-4">Übersicht</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-800 p-4 rounded-2xl"><p class="text-slate-400 text-sm">Workouts</p><p class="text-2xl font-bold">12</p></div>
                <div class="bg-slate-800 p-4 rounded-2xl"><p class="text-slate-400 text-sm">Volumen</p><p class="text-2xl font-bold">14.5 t</p></div>
            </div>
        </section>

        <section id="view-exercises" class="view-section">
            <h2 class="text-2xl font-bold mb-4">Übung erstellen</h2>
            <div class="bg-slate-800 p-4 rounded-2xl">
                <input type="text" id="ex-name" class="w-full p-3 rounded-xl input-gym mb-4" placeholder="Übungsname (z.B. Trizepsdrücken)">
                <p class="text-sm text-slate-400 mb-2">Primäre Muskeln:</p>
                <div id="p-muscles" class="flex flex-wrap gap-2 mb-4"></div>
                <button id="btn-save" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Speichern</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAOgvwt-l9DUpPeMPE-Pl9znDhIo1B_xB4", authDomain: "gitfit-3d78b.firebaseapp.com", projectId: "gitfit-3d78b", storageBucket: "gitfit-3d78b.firebasestorage.app", messagingSenderId: "595413065350", appId: "1:595413065350:web:2a0dde9defc2f750d4bb07" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Initialisiere Muskel-Buttons
        const muscles = ["Brust", "Rücken", "Beine", "Schultern", "Bizeps", "Trizeps", "Bauch"];
        const container = document.getElementById('p-muscles');
        muscles.forEach(m => {
            container.innerHTML += `<div class="muscle-pill" onclick="this.classList.toggle('active')">${m}</div>`;
        });

        onAuthStateChanged(auth, (user) => {
            document.getElementById('login-overlay').classList.toggle('hidden', !!user);
        });

        document.getElementById('btn-login').onclick = async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            } catch (e) { alert("Login fehlgeschlagen"); }
        };

        window.switchView = (id) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
    </script>
</body>
</html>
